<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pressure and Melting Point Simulation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5ede2; color: #2C2C2A; padding: 2rem 1rem; }
  h1 { font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 0.4rem; color: #2C2C2A; }
  .subtitle { font-size: 14px; text-align: center; color: #5F5E5A; margin-bottom: 1.5rem; }
  .sim-container { max-width: 680px; margin: 0 auto; background: #fff; border-radius: 12px; border: 1px solid #D3D1C7; padding: 1.5rem; }
  .controls { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
  .control-row { display: flex; align-items: center; gap: 12px; }
  .control-label { font-size: 13px; color: #5F5E5A; min-width: 140px; }
  .control-value { font-size: 14px; font-weight: 600; min-width: 100px; color: #2C2C2A; }
  input[type=range] { flex: 1; height: 6px; accent-color: #8B6914; cursor: pointer; }
  .canvas-area { width: 100%; height: 200px; border: 1px solid #D3D1C7; border-radius: 8px; overflow: hidden; background: #F1EFE8; margin-bottom: 1rem; position: relative; }
  canvas { position: absolute; top: 0; left: 0; }
  .info-row { display: flex; gap: 10px; margin-bottom: 1rem; }
  .info-card { flex: 1; background: #F5EFE6; border-radius: 8px; padding: 0.65rem 0.85rem; border: 1px solid #D3D1C7; }
  .info-card .label { font-size: 11px; color: #5F5E5A; margin-bottom: 3px; }
  .info-card .val { font-size: 15px; font-weight: 600; color: #2C2C2A; }
  .state-solid .val { color: #185FA5; }
  .state-liquid .val { color: #993C1D; }
  .insight { font-size: 13px; color: #444441; line-height: 1.7; padding: 0.85rem 1rem; background: #F5EFE6; border-radius: 8px; border-left: 4px solid #8B6914; margin-bottom: 1rem; min-height: 60px; }
  .question-box { background: #E8DCC8; border-radius: 8px; padding: 1rem 1.25rem; margin-top: 1rem; }
  .question-box h3 { font-size: 13px; font-weight: 600; color: #5C4A1E; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .question-box ol { padding-left: 1.2rem; font-size: 13px; color: #444441; line-height: 1.8; }
  .legend { display: flex; gap: 1.5rem; justify-content: center; margin-bottom: 1rem; font-size: 12px; color: #5F5E5A; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-solid { background: #378ADD; }
  .dot-liquid { background: #D85A30; }
  .note { font-size: 11px; color: #888780; text-align: center; margin-top: 1rem; font-style: italic; }
</style>
</head>
<body>

<div class="sim-container">
  <h1>Pressure and Melting Point</h1>
  <p class="subtitle">How does pressure affect when a substance melts?</p>

  <div class="controls">
    <div class="control-row">
      <span class="control-label">Pressure (atm)</span>
      <input type="range" id="pressure" min="0" max="500" value="0" step="1" oninput="update()">
      <span class="control-value" id="pval">0 atm</span>
    </div>
    <div class="control-row">
      <span class="control-label">Temperature (°C)</span>
      <input type="range" id="temperature" min="0" max="1200" value="200" step="10" oninput="update()">
      <span class="control-value" id="tval">200°C</span>
    </div>
  </div>

  <div class="info-row">
    <div class="info-card">
      <div class="label">Melting point at this pressure</div>
      <div class="val" id="melt-point">—</div>
    </div>
    <div class="info-card">
      <div class="label">Current temperature</div>
      <div class="val" id="cur-temp">—</div>
    </div>
    <div class="info-card" id="state-card">
      <div class="label">State of matter</div>
      <div class="val" id="state-text">—</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-solid"></div> Solid (organized, vibrating)</div>
    <div class="legend-item"><div class="legend-dot dot-liquid"></div> Liquid (flowing freely)</div>
  </div>

  <div class="canvas-area">
    <canvas id="particleCanvas"></canvas>
  </div>



</div>

<script>
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
const container = canvas.parentElement;
let particles = [];
let isLiquid = false;

function meltingPoint(p) {
  return Math.round(200 + p * 1.6);
}

function initParticles(liquid) {
  particles = [];
  const W = canvas.width, H = canvas.height;
  const cols = 18, rows = 8;
  const sx = W / (cols + 1);
  const sy = H / (rows + 1);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const bx = sx * (c + 1);
      const by = sy * (r + 1);
      particles.push({
        x: bx + (liquid ? (Math.random()-0.5)*40 : 0),
        y: by + (liquid ? (Math.random()-0.5)*30 : 0),
        bx, by,
        vx: liquid ? (Math.random()-0.5)*2 : 0,
        vy: liquid ? (Math.random()-0.5)*2 : 0,
        phase: Math.random()*Math.PI*2
      });
    }
  }
}

function resizeCanvas() {
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  initParticles(isLiquid);
}

function animate() {
  requestAnimationFrame(animate);
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const color = isLiquid ? '#D85A30' : '#378ADD';
  const t = Date.now() * 0.001;

  particles.forEach(p => {
    if (isLiquid) {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 7 || p.x > W-7) p.vx *= -1;
      if (p.y < 7 || p.y > H-7) p.vy *= -1;
      p.vx += (Math.random()-0.5)*0.15;
      p.vy += (Math.random()-0.5)*0.15;
      p.vx = Math.max(-3, Math.min(3, p.vx));
      p.vy = Math.max(-3, Math.min(3, p.vy));
    } else {
      p.x = p.bx + Math.sin(t*4 + p.phase)*1.2;
      p.y = p.by + Math.cos(t*3 + p.phase)*1.2;
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, 6.5, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.85;
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

function update() {
  const P = parseInt(document.getElementById('pressure').value);
  const T = parseInt(document.getElementById('temperature').value);
  const mp = meltingPoint(P);
  const liquid = T >= mp;

  document.getElementById('pval').textContent = P.toLocaleString() + ' atm';
  document.getElementById('tval').textContent = T.toLocaleString() + '°C';
  document.getElementById('melt-point').textContent = mp.toLocaleString() + '°C';
  document.getElementById('cur-temp').textContent = T.toLocaleString() + '°C';
  document.getElementById('state-text').textContent = liquid ? 'Liquid' : 'Solid';

  const stateCard = document.getElementById('state-card');
  stateCard.className = 'info-card ' + (liquid ? 'state-liquid' : 'state-solid');



  if (liquid !== isLiquid) {
    isLiquid = liquid;
    initParticles(isLiquid);
  }
}

resizeCanvas();
animate();
update();
window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
